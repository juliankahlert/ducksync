name: Build, Package and Release

on:
  push:
    branches:
      - "*"
      - "*/*"
    tags:
      - "v*"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            run_tests: true
          - target: aarch64-unknown-linux-musl
            run_tests: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install musl tools
        run: |
          echo '::group::Install musl tooling'
          sudo apt-get update
          sudo apt-get install -y musl-tools llvm
          echo '::endgroup::'

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}

      - name: Configure aarch64 linker environment
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          echo "CC_aarch64_unknown_linux_musl=clang" >> "$GITHUB_ENV"
          echo "AR_aarch64_unknown_linux_musl=llvm-ar" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_RUSTFLAGS=-Clink-self-contained=yes -Clinker=rust-lld" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=rust-lld" >> "$GITHUB_ENV"

      - name: Build release binary
        run: |
          echo '::group::Build release binary'
          cargo build --release --target "${{ matrix.target }}"
          echo '::endgroup::'

      - name: Run tests
        if: matrix.run_tests
        run: |
          echo '::group::Run tests'
          cargo test --target "${{ matrix.target }}"
          echo '::endgroup::'

      - name: Dump debug context
        if: runner.debug == '1'
        run: |
          printf 'github.ref=%s\n' "$GITHUB_REF"
          printf 'matrix.target=%s\n' "${{ matrix.target }}"
          printf 'matrix.run_tests=%s\n' "${{ matrix.run_tests }}"
          ls -R target

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: ducksync-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/ducksync
          if-no-files-found: error

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: diagnostics-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release
            Cargo.lock
          if-no-files-found: ignore
          retention-days: 5

      - name: Write build summary
        if: always()
        run: |
          if [ -f "target/${{ matrix.target }}/release/ducksync" ]; then
            size=$(stat -c%s "target/${{ matrix.target }}/release/ducksync")
            status=success
          else
            size=n/a
            status=failure
          fi
          {
            echo '| target | run_tests | binary size | status |'
            echo '| --- | --- | --- | --- |'
            printf '| %s | %s | %s | %s |\n' "${{ matrix.target }}" "${{ matrix.run_tests }}" "$size" "$status"
          } >> "$GITHUB_STEP_SUMMARY"

  package:
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download binary artifact
        uses: actions/download-artifact@v8
        with:
          name: ducksync-${{ matrix.target }}
          path: target/${{ matrix.target }}/release

      - name: Install packaging tools
        run: |
          echo '::group::Install packaging tools'
          cargo install cargo-deb --version 3.6.3 --locked
          cargo install cargo-generate-rpm --version 0.20.0 --locked
          echo '::endgroup::'

      - name: Build packages
        run: |
          echo '::group::Package release artifacts'
          chmod +x "target/${{ matrix.target }}/release/ducksync"
          cargo deb --no-build --target "${{ matrix.target }}"
          cargo generate-rpm --target "${{ matrix.target }}"
          echo '::endgroup::'

      - name: Collect packaged assets
        run: |
          mkdir -p dist
          mv "target/${{ matrix.target }}/release/ducksync" "dist/ducksync-${{ matrix.target }}"
          cp target/${{ matrix.target }}/debian/*.deb dist/
          cp target/${{ matrix.target }}/generate-rpm/*.rpm dist/

      - name: Upload package artifacts
        uses: actions/upload-artifact@v7
        with:
          name: packages-${{ matrix.target }}
          path: |
            dist/*.deb
            dist/*.rpm
            dist/ducksync-${{ matrix.target }}
          if-no-files-found: error

      - name: Write package summary
        if: always()
        run: |
          {
            echo '| target | asset | size |'
            echo '| --- | --- | --- |'
            for asset in dist/*; do
              printf '| %s | %s | %s |\n' "${{ matrix.target }}" "$(basename "$asset")" "$(stat -c%s "$asset")"
            done
          } >> "$GITHUB_STEP_SUMMARY"

  release:
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: packages-*
          merge-multiple: true
          path: dist/

      - name: Generate checksums
        run: |
          echo '::group::Generate SHA256 sums'
          cd dist
          shopt -s nullglob
          debs=(*.deb)
          rpms=(*.rpm)
          binaries=(ducksync-x86_64-unknown-linux-musl ducksync-aarch64-unknown-linux-musl)
          if [ "${#debs[@]}" -ne 2 ] || [ "${#rpms[@]}" -ne 2 ]; then
            echo "Expected 2 debs and 2 rpms, found ${#debs[@]} debs and ${#rpms[@]} rpms"
            printf 'debs:\n%s\n' "${debs[@]}"
            printf 'rpms:\n%s\n' "${rpms[@]}"
            exit 1
          fi
          for binary in "${binaries[@]}"; do
            if [ ! -f "$binary" ]; then
              echo "Missing expected binary: $binary"
              exit 1
            fi
          done
          files=("${debs[@]}" "${rpms[@]}" "${binaries[@]}")
          if [ "${#files[@]}" -ne 6 ]; then
            echo "Expected 6 release files, found ${#files[@]}"
            printf '%s\n' "${files[@]}"
            exit 1
          fi
          printf '%s\n' "${files[@]}" | sort | xargs sha256sum > SHA256SUMS
          echo '::endgroup::'

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

      - name: Write release summary
        run: |
          {
            echo '| asset | size | sha256 |'
            echo '| --- | --- | --- |'
            while read -r hash file; do
              size=$(stat -c%s "dist/$file")
              short_hash=${hash:0:12}
              printf '| %s | %s | %s… |\n' "$file" "$size" "$short_hash"
            done < dist/SHA256SUMS
          } >> "$GITHUB_STEP_SUMMARY"
